<svg xmlns="http://www.w3.org/2000/svg" width="375" height="667" viewBox="0 0 375 667">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="50%" style="stop-color:#90EE90"/>
      <stop offset="100%" style="stop-color:#228B22"/>
    </linearGradient>
  </defs>
  <!-- 森林背景 -->
  <rect width="375" height="667" fill="url(#bg)"/>
  
  <!-- 标题 -->
  <text x="187.5" y="200" font-family="Arial" font-size="48" font-weight="bold" fill="white" text-anchor="middle">曲径</text>
  <text x="187.5" y="240" font-family="Arial" font-size="20" fill="white" text-anchor="middle">小兔版</text>
  <text x="187.5" y="300" font-family="Arial" font-size="18" fill="white" text-anchor="middle">最高分: 0</text>
  <text x="187.5" y="400" font-family="Arial" font-size="16" fill="white" text-anchor="middle">点击下方按钮开始游戏</text>
  
  <!-- 小兔子 -->
  <ellipse cx="187.5" cy="320" rx="25" ry="20" fill="white"/>
  <circle cx="187.5" cy="315" r="17" fill="white"/>
  <ellipse cx="181.5" cy="300" rx="4" ry="12" fill="white"/>
  <ellipse cx="193.5" cy="300" rx="4" ry="12" fill="white"/>
  <ellipse cx="181.5" cy="300" rx="2" ry="8" fill="#FFB6C1"/>
  <ellipse cx="193.5" cy="300" rx="2" ry="8" fill="#FFB6C1"/>
  <circle cx="183.5" cy="314" r="2" fill="#FF0000"/>
  <circle cx="191.5" cy="314" r="2" fill="#FF0000"/>
  <circle cx="187.5" cy="318" r="2" fill="#FF69B4"/>
  
  <!-- 按钮 -->
  <circle cx="40" cy="587" r="25" fill="rgba(255,255,255,0.5)"/>
  <circle cx="335" cy="587" r="25" fill="rgba(255,255,255,0.5)"/>
  <text x="40" y="595" font-family="Arial" font-size="24" font-weight="bold" fill="black" text-anchor="middle">←</text>
  <text x="335" y="595" font-family="Arial" font-size="24" font-weight="bold" fill="black" text-anchor="middle">→</text>
</svg>
