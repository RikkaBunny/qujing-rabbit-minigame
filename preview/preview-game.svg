  <!-- 小兔子 -->
  <g transform="translate(220, 437)">
    <ellipse cx="0" cy="0" rx="15" ry="12" fill="white"/>
    <circle cx="0" cy="-5" r="10" fill="white"/>
    <ellipse cx="-6" cy="-18" rx="3" ry="8" fill="white"/>
    <ellipse cx="6" cy="-18" rx="3" ry="8" fill="white"/>
    <ellipse cx="-6" cy="-18" rx="2" ry="5" fill="#FFB6C1"/>
